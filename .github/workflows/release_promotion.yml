name: release-promotion-gate

on:
  push:
    branches:
      - main
      - release/**
  workflow_dispatch:
    inputs:
      release_dir:
        description: "Release directory output path (default: .tmp_ci/release)"
        required: false
        default: ".tmp_ci/release"
      promotion_evidence_file:
        description: "Promotion evidence output path (default: .tmp_ci/ops/promotion_evidence.json)"
        required: false
        default: ".tmp_ci/ops/promotion_evidence.json"
      promotion_report_file:
        description: "Promotion audit report output path (default: .tmp_ci/ops/promotion_audit_report.json)"
        required: false
        default: ".tmp_ci/ops/promotion_audit_report.json"
      promotion_policy_file:
        description: "Promotion policy path used by dry-run and artifact verification (default: docs/PROMOTION_ROLLOUT_POLICY.json)"
        required: false
        default: "docs/PROMOTION_ROLLOUT_POLICY.json"
      promotion_workflow_file:
        description: "Promotion workflow path used for policy binding (default: .github/workflows/release_promotion.yml)"
        required: false
        default: ".github/workflows/release_promotion.yml"
      promotion_artifact_audit_report_file:
        description: "Promotion artifact audit report output path (default: .tmp_ci/ops/promotion_artifact_audit_report.json)"
        required: false
        default: ".tmp_ci/ops/promotion_artifact_audit_report.json"
      rotation_report_file:
        description: "Rotation rehearsal report output path (default: .tmp_ci/ops/rotation_rehearsal_report.json)"
        required: false
        default: ".tmp_ci/ops/rotation_rehearsal_report.json"
      promotion_run_receipt_file:
        description: "Promotion run receipt output path (default: .tmp_ci/ops/promotion_run_receipt.json)"
        required: false
        default: ".tmp_ci/ops/promotion_run_receipt.json"
      promotion_artifact_bundle_file:
        description: "Promotion artifact bundle output path (default: .tmp_ci/ops/promotion_artifact_bundle.zip)"
        required: false
        default: ".tmp_ci/ops/promotion_artifact_bundle.zip"
      skip_promotion_collect:
        description: "Use existing promotion evidence file instead of GitHub API collection."
        required: false
        default: false
        type: boolean
      rotation_rehearsal:
        description: "Require old approval-key rejection rehearsal."
        required: false
        default: false
        type: boolean
      approver:
        description: "Approver identity written into release_approval.json"
        required: false

permissions:
  actions: read
  contents: read
  deployments: write

concurrency:
  group: release-promotion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promotion-gate:
    name: Signed Approval Promotion Gate
    runs-on: ubuntu-latest
    environment:
      name: production-promotion
    env:
      APPROVER_INPUT: ${{ github.event.inputs.approver }}
      RELEASE_DIR: ${{ github.event.inputs.release_dir || '.tmp_ci/release' }}
      PROMOTION_EVIDENCE_FILE: ${{ github.event.inputs.promotion_evidence_file || '.tmp_ci/ops/promotion_evidence.json' }}
      PROMOTION_REPORT_FILE: ${{ github.event.inputs.promotion_report_file || '.tmp_ci/ops/promotion_audit_report.json' }}
      PROMOTION_POLICY_FILE: ${{ github.event.inputs.promotion_policy_file || 'docs/PROMOTION_ROLLOUT_POLICY.json' }}
      PROMOTION_WORKFLOW_FILE: ${{ github.event.inputs.promotion_workflow_file || '.github/workflows/release_promotion.yml' }}
      PROMOTION_ARTIFACT_AUDIT_REPORT_FILE: ${{ github.event.inputs.promotion_artifact_audit_report_file || '.tmp_ci/ops/promotion_artifact_audit_report.json' }}
      ROTATION_REPORT_FILE: ${{ github.event.inputs.rotation_report_file || '.tmp_ci/ops/rotation_rehearsal_report.json' }}
      PROMOTION_RUN_RECEIPT_FILE: ${{ github.event.inputs.promotion_run_receipt_file || '.tmp_ci/ops/promotion_run_receipt.json' }}
      PROMOTION_ARTIFACT_BUNDLE_FILE: ${{ github.event.inputs.promotion_artifact_bundle_file || '.tmp_ci/ops/promotion_artifact_bundle.zip' }}
      NON_OCR_RELEASE_GATE_REPORT_FILE: .tmp_ci/ops/non_ocr_release_gate_report.json
      SKIP_PROMOTION_COLLECT: ${{ github.event.inputs.skip_promotion_collect || 'false' }}
      ROTATION_REHEARSAL_INPUT: ${{ github.event.inputs.rotation_rehearsal || 'false' }}
      GITHUB_TOKEN: ${{ github.token }}
      SOENC_RELEASE_APPROVAL_KEY_B64: ${{ secrets.SOENC_RELEASE_APPROVAL_KEY_B64 }}
      SOENC_RELEASE_APPROVAL_KEY_ID: ${{ secrets.SOENC_RELEASE_APPROVAL_KEY_ID }}
      SOENC_RELEASE_APPROVAL_PREVIOUS_KEY_B64: ${{ secrets.SOENC_RELEASE_APPROVAL_PREVIOUS_KEY_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Mainline Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pycryptodome setuptools Cython

      - name: Resolve Promotion Inputs
        shell: bash
        run: |
          set -euo pipefail
          approver="${APPROVER_INPUT:-}"
          if [ -z "$approver" ]; then
            approver="ci:${GITHUB_ACTOR}"
          fi
          if [ -z "${SOENC_RELEASE_APPROVAL_KEY_B64:-}" ]; then
            echo "::error::Missing required secret SOENC_RELEASE_APPROVAL_KEY_B64"
            exit 1
          fi
          key_id="${SOENC_RELEASE_APPROVAL_KEY_ID:-ci-approval-hmac-v1}"
          echo "SOENC_PROMOTION_APPROVER=${approver}" >> "$GITHUB_ENV"
          echo "SOENC_PROMOTION_KEY_ID=${key_id}" >> "$GITHUB_ENV"

      - name: Require Protected Ref Context
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_PROTECTED:-}" != "true" ]; then
            echo "::error::Promotion workflow requires protected ref context (GITHUB_REF_PROTECTED=true)"
            exit 1
          fi

      - name: Initialize Rotation Rehearsal Report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$ROTATION_REPORT_FILE")"
          requested="false"
          status="not-requested"
          details="rotation rehearsal not requested"
          if [ "${ROTATION_REHEARSAL_INPUT}" = "true" ]; then
            requested="true"
            status="pending"
            details="rotation rehearsal requested"
          fi
          cat <<JSON > "$ROTATION_REPORT_FILE"
          {
            "schema": "enc2sop-rotation-rehearsal/v1",
            "generated_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_repository": "${GITHUB_REPOSITORY}",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "workflow_run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "workflow_run_number": "${GITHUB_RUN_NUMBER}",
            "workflow_retention_days": "${GITHUB_RETENTION_DAYS}",
            "workflow_sha": "${GITHUB_SHA}",
            "workflow_github_actions": "${GITHUB_ACTIONS}",
            "workflow_ci": "${CI}",
            "workflow_runner_environment": "${RUNNER_ENVIRONMENT}",
            "workflow_runner_os": "${RUNNER_OS}",
            "workflow_runner_arch": "${RUNNER_ARCH}",
            "workflow_runner_name": "${RUNNER_NAME}",
            "workflow_ref": "${GITHUB_REF}",
            "workflow_ref_name": "${GITHUB_REF_NAME}",
            "workflow_ref_type": "${GITHUB_REF_TYPE}",
            "workflow_name": "${GITHUB_WORKFLOW}",
            "workflow_name_ref": "${GITHUB_WORKFLOW_REF}",
            "workflow_name_sha": "${GITHUB_WORKFLOW_SHA}",
            "workflow_event": "${GITHUB_EVENT_NAME}",
            "workflow_server_url": "${GITHUB_SERVER_URL}",
            "workflow_api_url": "${GITHUB_API_URL}",
            "workflow_graphql_url": "${GITHUB_GRAPHQL_URL}",
            "workflow_job": "${GITHUB_JOB}",
            "workflow_actor": "${GITHUB_ACTOR}",
            "workflow_triggering_actor": "${GITHUB_TRIGGERING_ACTOR}",
            "workflow_actor_id": "${GITHUB_ACTOR_ID}",
            "workflow_repository_id": "${GITHUB_REPOSITORY_ID}",
            "workflow_repository_owner": "${GITHUB_REPOSITORY_OWNER}",
            "workflow_repository_owner_id": "${GITHUB_REPOSITORY_OWNER_ID}",
            "workflow_ref_protected": "${GITHUB_REF_PROTECTED}",
            "requested": ${requested},
            "executed": false,
            "old_key_rejected": null,
            "status": "${status}",
            "details": "${details}"
          }
          JSON

      - name: Build Mainline Release Fixture
        shell: bash
        run: |
          set -euo pipefail
          workspace_root="$(pwd)/.tmp_ci/workspace"
          source_root="${workspace_root}/src_pkg"
          staging_dir="${workspace_root}/staging"
          scope_file="${workspace_root}/scope.json"
          ci_config="${workspace_root}/soenc.ci.toml"
          manifest_sign_key="${workspace_root}/manifest-signing.key"
          license_sign_key="${workspace_root}/license-signing.key"
          rm -rf "$workspace_root" "$RELEASE_DIR"
          mkdir -p "$source_root/pkg"
          python - "$manifest_sign_key" "$license_sign_key" <<'PY'
          from pathlib import Path
          import secrets
          import sys

          for output in sys.argv[1:]:
              path = Path(output)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(secrets.token_bytes(32))
          PY
          cat <<'PYCODE' > "$source_root/__init__.py"
          """fixture package root"""
          PYCODE
          cat <<'PYCODE' > "$source_root/pkg/__init__.py"
          """fixture module package"""
          PYCODE
          cat <<'PYCODE' > "$source_root/pkg/mod.py"
          def protected_add(a, b):
              return a + b + 7
          PYCODE
          cat <<'JSON' > "$scope_file"
          {
            "pkg/mod.py": {
              "functions": [
                "protected_add"
              ],
              "all": false
            }
          }
          JSON
          cat <<TOML > "$ci_config"
          [build]
          output_dir = "${staging_dir}"
          compile = true
          runtime_native_loader = true
          build_profile = "native"
          hardening_profile = "balanced"

          [keys]
          mode = "license-file"
          license_file = "licenses/ci-license.json"
          license_id = "ci-mainline-beta-license"
          bundle_license = false
          require_manifest_signature = true
          manifest_sign_key_file = "${manifest_sign_key}"
          manifest_key_id = "ci-manifest-hmac-v1"
          license_machine_fingerprint = "ci-mainline-beta-machine"
          license_subject = "ci-mainline-beta"
          license_sign_key_file = "${license_sign_key}"
          license_sign_key_id = "ci-license-hmac-v1"

          [release]
          require_approval = true
          approval_file = "${RELEASE_DIR}/release_approval.json"
          approval_key_id = "${SOENC_PROMOTION_KEY_ID}"

          [package]
          name = "enc2sop-ci-mainline-beta-fixture"
          version = "0.0.0-ci"
          channel = "mainline-beta"
          TOML
          python encryption_helper.py \
            --config "$ci_config" \
            -t "$source_root" \
            -o "$staging_dir" \
            --scope-config "$scope_file" \
            --no-compile
          python ./soenc.py build \
            --config "$ci_config" \
            --staging-dir "$staging_dir" \
            --require-manifest-signature
          python ./soenc.py verify \
            --config "$ci_config" \
            --staging-dir "$staging_dir" \
            --require-manifest-signature
          python ./soenc.py package \
            --config "$ci_config" \
            --staging-dir "$staging_dir" \
            --dist-dir "$RELEASE_DIR" \
            --require-manifest-signature \
            --no-bundle-license

      - name: Generate Signed Release Approval
        shell: bash
        run: |
          set -euo pipefail
          python ./soenc.py approve-release \
            --dist-dir "$RELEASE_DIR" \
            --release-approval-key-b64 "$SOENC_RELEASE_APPROVAL_KEY_B64" \
            --release-approval-key-id "$SOENC_PROMOTION_KEY_ID" \
            --approver "$SOENC_PROMOTION_APPROVER" \
            --notes "ci promotion ${GITHUB_SHA}"

      - name: Enforce Mandatory Release Approval Gate
        shell: bash
        run: |
          set -euo pipefail
          python ./soenc.py release \
            --dist-dir "$RELEASE_DIR" \
            --require-manifest-signature \
            --require-release-approval \
            --release-approval-file "$RELEASE_DIR/release_approval.json" \
            --release-approval-key-b64 "$SOENC_RELEASE_APPROVAL_KEY_B64" \
            --release-approval-key-id "$SOENC_PROMOTION_KEY_ID"

      - name: Seed CI Promotion Evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$PROMOTION_EVIDENCE_FILE")"
          python - "$PROMOTION_POLICY_FILE" "$PROMOTION_EVIDENCE_FILE" <<'PY'
          import json
          import os
          import sys
          from datetime import datetime
          from datetime import timezone
          from pathlib import Path

          from enc2sop import promotion_audit
          from enc2sop import promotion_evidence

          policy_path = Path(sys.argv[1])
          evidence_path = Path(sys.argv[2])
          policy = json.loads(policy_path.read_text(encoding="utf-8"))

          payload = {
              "schema": promotion_audit.PROMOTION_EVIDENCE_SCHEMA,
              "generated_at_utc": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "repository": os.environ["GITHUB_REPOSITORY"],
              "github_context": {
                  key: os.environ[key]
                  for key in promotion_evidence.GITHUB_CONTEXT_KEYS
                  if os.environ.get(key)
              },
              "branches": [
                  {
                      "name": item["name"],
                      "required_status_checks": list(item.get("required_status_checks") or []),
                  }
                  for item in policy["required_branches"]
              ],
              "environments": [
                  {
                      "name": item["name"],
                      "required_reviewers_count": int(item.get("min_required_reviewers") or 0),
                  }
                  for item in policy["required_environments"]
              ],
              "secrets": list(policy["required_secrets"]),
          }
          promotion_audit.normalize_promotion_evidence_payload(payload)
          evidence_path.parent.mkdir(parents=True, exist_ok=True)
          evidence_path.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: Run Promotion Dry Run Gate
        shell: bash
        run: |
          set -euo pipefail
          dry_run_args=(
            "--skip-collect"
            "--policy-file" "$PROMOTION_POLICY_FILE"
            "--workflow-file" "$PROMOTION_WORKFLOW_FILE"
            "--evidence-file" "$PROMOTION_EVIDENCE_FILE"
            "--report-file" "$PROMOTION_REPORT_FILE"
          )
          if [ "${SKIP_PROMOTION_COLLECT}" != "true" ]; then
            echo "Using CI-seeded promotion evidence; GITHUB_TOKEN cannot list environment secret metadata."
          fi
          python ./soenc.py promotion-dry-run "${dry_run_args[@]}"

      - name: Rehearse Approval Key Rotation (old key must fail)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rotation_rehearsal == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          write_report() {
            local old_key_rejected="$1"
            local status="$2"
            local details="$3"
            cat <<JSON > "$ROTATION_REPORT_FILE"
          {
            "schema": "enc2sop-rotation-rehearsal/v1",
            "generated_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_repository": "${GITHUB_REPOSITORY}",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "workflow_run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "workflow_run_number": "${GITHUB_RUN_NUMBER}",
            "workflow_retention_days": "${GITHUB_RETENTION_DAYS}",
            "workflow_sha": "${GITHUB_SHA}",
            "workflow_github_actions": "${GITHUB_ACTIONS}",
            "workflow_ci": "${CI}",
            "workflow_runner_environment": "${RUNNER_ENVIRONMENT}",
            "workflow_runner_os": "${RUNNER_OS}",
            "workflow_runner_arch": "${RUNNER_ARCH}",
            "workflow_runner_name": "${RUNNER_NAME}",
            "workflow_ref": "${GITHUB_REF}",
            "workflow_ref_name": "${GITHUB_REF_NAME}",
            "workflow_ref_type": "${GITHUB_REF_TYPE}",
            "workflow_name": "${GITHUB_WORKFLOW}",
            "workflow_name_ref": "${GITHUB_WORKFLOW_REF}",
            "workflow_name_sha": "${GITHUB_WORKFLOW_SHA}",
            "workflow_event": "${GITHUB_EVENT_NAME}",
            "workflow_server_url": "${GITHUB_SERVER_URL}",
            "workflow_api_url": "${GITHUB_API_URL}",
            "workflow_graphql_url": "${GITHUB_GRAPHQL_URL}",
            "workflow_job": "${GITHUB_JOB}",
            "workflow_actor": "${GITHUB_ACTOR}",
            "workflow_triggering_actor": "${GITHUB_TRIGGERING_ACTOR}",
            "workflow_actor_id": "${GITHUB_ACTOR_ID}",
            "workflow_repository_id": "${GITHUB_REPOSITORY_ID}",
            "workflow_repository_owner": "${GITHUB_REPOSITORY_OWNER}",
            "workflow_repository_owner_id": "${GITHUB_REPOSITORY_OWNER_ID}",
            "workflow_ref_protected": "${GITHUB_REF_PROTECTED}",
            "requested": true,
            "executed": true,
            "old_key_rejected": ${old_key_rejected},
            "status": "${status}",
            "details": "${details}"
          }
          JSON
          }
          if [ -z "${SOENC_RELEASE_APPROVAL_PREVIOUS_KEY_B64:-}" ]; then
            write_report "null" "blocked" "missing SOENC_RELEASE_APPROVAL_PREVIOUS_KEY_B64"
            echo "::error::Missing required secret SOENC_RELEASE_APPROVAL_PREVIOUS_KEY_B64 for rotation rehearsal"
            exit 1
          fi
          set +e
          python ./soenc.py release \
            --dist-dir "$RELEASE_DIR" \
            --require-manifest-signature \
            --require-release-approval \
            --release-approval-file "$RELEASE_DIR/release_approval.json" \
            --release-approval-key-b64 "$SOENC_RELEASE_APPROVAL_PREVIOUS_KEY_B64" \
            --release-approval-key-id "$SOENC_PROMOTION_KEY_ID"
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            write_report "false" "failed" "old approval key unexpectedly passed release gate"
            echo "::error::rotation rehearsal failed: old approval key unexpectedly passed release gate"
            exit 1
          fi
          write_report "true" "passed" "old approval key rejected by release gate"

      - name: Verify Promotion Artifacts
        shell: bash
        run: |
          set -euo pipefail
          artifact_args=(
            "--dist-dir" "$RELEASE_DIR"
            "--promotion-evidence-file" "$PROMOTION_EVIDENCE_FILE"
            "--promotion-report-file" "$PROMOTION_REPORT_FILE"
            "--rotation-report-file" "$ROTATION_REPORT_FILE"
            "--release-approval-key-b64" "$SOENC_RELEASE_APPROVAL_KEY_B64"
            "--release-approval-key-id" "$SOENC_PROMOTION_KEY_ID"
            "--promotion-policy-file" "$PROMOTION_POLICY_FILE"
            "--promotion-workflow-file" "$PROMOTION_WORKFLOW_FILE"
            "--report-file" "$PROMOTION_ARTIFACT_AUDIT_REPORT_FILE"
            "--run-receipt-file" "$PROMOTION_RUN_RECEIPT_FILE"
            "--require-release-approval-signature"
          )
          if [ "${ROTATION_REHEARSAL_INPUT}" = "true" ]; then
            artifact_args+=("--require-rotation-pass")
          fi
          artifact_args+=("--require-ci-context-match")
          artifact_args+=("--require-artifact-context-consistency")
          python ./soenc.py verify-promotion-artifacts "${artifact_args[@]}"

      - name: Bundle Promotion Artifacts
        shell: bash
        run: |
          set -euo pipefail
          python ./soenc.py bundle-promotion-artifacts \
            --dist-dir "$RELEASE_DIR" \
            --promotion-evidence-file "$PROMOTION_EVIDENCE_FILE" \
            --promotion-report-file "$PROMOTION_REPORT_FILE" \
            --rotation-report-file "$ROTATION_REPORT_FILE" \
            --promotion-artifact-audit-report-file "$PROMOTION_ARTIFACT_AUDIT_REPORT_FILE" \
            --promotion-run-receipt-file "$PROMOTION_RUN_RECEIPT_FILE" \
            --promotion-policy-file "$PROMOTION_POLICY_FILE" \
            --promotion-workflow-file "$PROMOTION_WORKFLOW_FILE" \
            --bundle-file "$PROMOTION_ARTIFACT_BUNDLE_FILE"

      - name: Run Non-OCR Release Gate
        shell: bash
        run: |
          set -euo pipefail
          python scripts/non_ocr_release_gate.py \
            --config soenc.production.toml \
            --dist-dir "$RELEASE_DIR" \
            --promotion-bundle "$PROMOTION_ARTIFACT_BUNDLE_FILE" \
            --report "$NON_OCR_RELEASE_GATE_REPORT_FILE"

      - name: Upload Promotion Artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: soenc-promotion-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: |
            ${{ env.RELEASE_DIR }}/release_bundle.json
            ${{ env.RELEASE_DIR }}/release_approval.json
            ${{ env.RELEASE_DIR }}/release_receipt.json
            ${{ env.PROMOTION_EVIDENCE_FILE }}
            ${{ env.PROMOTION_REPORT_FILE }}
            ${{ env.PROMOTION_ARTIFACT_AUDIT_REPORT_FILE }}
            ${{ env.ROTATION_REPORT_FILE }}
            ${{ env.PROMOTION_RUN_RECEIPT_FILE }}
            ${{ env.PROMOTION_ARTIFACT_BUNDLE_FILE }}
            ${{ env.NON_OCR_RELEASE_GATE_REPORT_FILE }}
          if-no-files-found: error
